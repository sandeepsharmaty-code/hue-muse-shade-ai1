// Purpose      : Gradle settings for Hue Muse Shade AI (Android platform).
// Version      : 1.0.0
// Description  : Standard Flutter Android embedding v2 settings file.
//                Added as part of the v1.0.0 Release Readiness Audit
//                to close the "android/ platform folder has never
//                existed" gap flagged since SPR-DEP-001 and recorded
//                in docs/release/KNOWN_ISSUES.md (item 1).
// Change History:
//   1.0.0 - Release Audit (RC-1.0.0) - Initial creation.

pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"
